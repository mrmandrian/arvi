<!DOCTYPE html>
<html>
  <head>
    <title>Tularasa AR Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body { margin: 0; overflow: hidden; touch-action: none; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      
      #ask-button { 
        position: fixed; 
        bottom: 30px; 
        left: 5%; 
        width: 90%; 
        padding: 14px 0; 
        border-radius: 50px; 
        font-weight: bold; 
        font-size: 16px; 
        text-align: center; 
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
        color: white; 
        text-decoration: none; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
        z-index: 100; 
      }

      /* Container untuk tombol pilihan model */
      #model-selector {
        position: fixed;
        bottom: 90px; /* Ditaruh persis di atas tombol Ask Me */
        left: 5%;
        width: 90%;
        display: flex;
        gap: 10px;
        z-index: 100;
        justify-content: space-between;
      }

      /* Style untuk masing-masing tombol angka */
      .model-btn {
        flex: 1; /* Membuat lebar fleksibel membagi ruang */
        padding: 12px 0;
        background: #a3e635; /* Warna hijau terang sesuai referensi gambar */
        color: white;
        border: none;
        border-radius: 30px;
        font-size: 16px;
        font-weight: bold;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        cursor: pointer;
        transition: transform 0.1s, background 0.3s;
      }
      
      .model-btn:active {
        transform: scale(0.95);
      }
      
      .model-btn.active {
        background: #65a30d; /* Warna hijau lebih gelap untuk tombol yang sedang aktif */
        box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
      }
    </style>
  </head>
  <body>
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;" renderer="colorManagement: true" vr-mode-ui="enabled: false">
      
      <a-marker type="pattern" url="./pattern-mcQBre.patt">
        <a-entity id="model-controller" rotation="0 0 0" position="0 0 0" scale="1 1 1">
          <a-gltf-model id="active-model" src="https://raw.githubusercontent.com/mrmandrian/arvi/main/ujang.glb"></a-gltf-model>
        </a-entity>
      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>

    <div id="model-selector">
      <button class="model-btn active" onclick="changeModel(1, this)">1</button>
      <button class="model-btn" onclick="changeModel(2, this)">2</button>
      <button class="model-btn" onclick="changeModel(3, this)">3</button>
    </div>

    <a href="https://wa.me/6285956252757" id="ask-button">💬 Ask Me</a>

    <script>
      const controller = document.getElementById('model-controller');
      const activeModel = document.getElementById('active-model');
      let scale = 1; // Default scale ujang
      let baseRotX = 0; // Default rotasi X (ujang berdiri tegak)
      let rotY = 0;
      let lastX, dist;

      // Konfigurasi untuk masing-masing model (Raw URL)
      const models = {
        1: {
          url: "https://raw.githubusercontent.com/mrmandrian/arvi/main/ujang.glb",
          initScale: 1,
          initRotX: 0 // Ujang berdiri
        },
        2: {
          url: "https://raw.githubusercontent.com/mrmandrian/arvi/main/forest_house.glb",
          initScale: 2,
          initRotX: -90 // Lapangan harus rebahan
        },
        3: {
          url: "https://raw.githubusercontent.com/mrmandrian/arvi/main/hiking_boots_lowpoly.glb",
          initScale: 0.5, // Sesuaikan nanti kalau kebesaran/kekecilan
          initRotX: 0 // Asumsi sepatu berdiri tegak
        }
      };

      // Fungsi ganti model
      window.changeModel = function(modelId, btnElement) {
        const config = models[modelId];
        
        // 1. Ganti src file
        activeModel.setAttribute('src', config.url);
        
        // 2. Reset parameter gesture ke nilai bawaan model baru
        scale = config.initScale;
        baseRotX = config.initRotX;
        rotY = 0;
        
        // 3. Terapkan reset ke scene
        controller.setAttribute('scale', `${scale} ${scale} ${scale}`);
        controller.setAttribute('rotation', `${baseRotX} 0 0`);

        // 4. Update UI (warna tombol)
        document.querySelectorAll('.model-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
      };

      // Gestur Pinch & Swipe
      document.addEventListener('touchmove', (e) => {
        // Jangan block touch kalau yg disentuh adalah tombol UI
        if(e.target.closest('#model-selector') || e.target.closest('#ask-button')) return;
        
        e.preventDefault();
        
        if (e.touches.length === 1) {
          rotY += (e.touches[0].clientX - (lastX || e.touches[0].clientX)) * 0.5;
          lastX = e.touches[0].clientX;
          // Putar dengan baseRotX yang dinamis sesuai model yg aktif
          controller.setAttribute('rotation', `${baseRotX} ${rotY} 0`);
        } else if (e.touches.length === 2) {
          const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
          if (dist) {
            scale *= (d / dist);
            scale = Math.min(Math.max(scale, 0.1), 30);
          }
          dist = d;
          controller.setAttribute('scale', `${scale} ${scale} ${scale}`);
        }
      }, { passive: false });

      document.addEventListener('touchend', () => { lastX = null; dist = null; });
    </script>
  </body>
</html>
