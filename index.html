<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARVI MVP Engine - Syaira Core</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <style>
        body { margin: 0; padding: 0; background-color: #0f172a; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }
        #arvi-viewport { width: 100vw; height: 100vh; background-color: #0f172a; }

        /* Panel Kontrol Variansi Tampilan */
        #arvi-ui {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 999;
            width: 90%; max-width: 420px; background: rgba(255, 255, 255, 0.95);
            padding: 16px; border-radius: 20px; box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            text-align: center; backdrop-filter: blur(10px);
        }
        .ui-title { margin: 0 0 12px 0; font-size: 12px; color: #1e3a8a; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; }
        .btn-container { display: flex; gap: 8px; justify-content: center; }
        .variance-btn {
            flex: 1; padding: 12px 6px; border: 2px solid #2563eb; background: white;
            color: #2563eb; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 11px;
            transition: all 0.2s ease;
        }
        .variance-btn.active { background: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
    </style>
</head>
<body>

    <div id="arvi-ui">
        <div class="ui-title">ARVI Variance Control</div>
        <div class="btn-container">
            <button class="variance-btn active" id="btn-normal">Normal View</button>
            <button class="variance-btn" id="btn-wireframe">Wireframe</button>
            <button class="variance-btn" id="btn-ghost">Ghost View</button>
        </div>
    </div>

    <model-viewer 
        id="arvi-viewport" 
        src="./basketball_court.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        interaction-prompt="auto"
        shadow-intensity="1" 
        ar-placement="floor"
        alt="ARVI 3D Basketball Court Object">
    </model-viewer>

    <script>
        const modelViewer = document.querySelector('#arvi-viewport');

        // Pengendali Manipulasi Material PBR via WebGL GPU Memory
        modelViewer.addEventListener('load', () => {
            const materials = modelViewer.model.materials;
            if (!materials || materials.length === 0) return;

            // Cache warna asli produk bawaan file .glb lo
            const originalColors = materials.map(mat => mat.pbrMetallicRoughness.baseColorFactor);

            // 1. Variansi: Tampilan Normal
            document.getElementById('btn-normal').addEventListener('click', function() {
                setActiveButton(this);
                materials.forEach((mat, idx) => {
                    mat.pbrMetallicRoughness.setBaseColorFactor(originalColors[idx]);
                    mat.setAlphaMode("OPAQUE");
                });
            });

            // 2. Variansi: Wireframe Simulation (Warna Flat Skematik Hijau Komputer Cyberpunk)
            document.getElementById('btn-wireframe').addEventListener('click', function() {
                setActiveButton(this);
                materials.forEach((mat) => {
                    mat.pbrMetallicRoughness.setBaseColorFactor([0.0, 1.0, 0.0, 0.8]); 
                    mat.setAlphaMode("BLEND");
                });
            });

            // 3. Variansi: Ghost View (X-Ray Transparansi Tembus Pandang)
            document.getElementById('btn-ghost').addEventListener('click', function() {
                setActiveButton(this);
                materials.forEach((mat, idx) => {
                    const orig = originalColors[idx];
                    mat.pbrMetallicRoughness.setBaseColorFactor([orig[0], orig[1], orig[2], 0.25]);
                    mat.setAlphaMode("BLEND");
                });
            });
        });

        function setActiveButton(element) {
            const buttons = document.querySelectorAll('.variance-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
