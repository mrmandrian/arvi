<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tularasa AR Viewer</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        margin: 0;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      }

      #ar-container {
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      a-scene {
        width: 100%;
        height: 100%;
      }

      #ask-button {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        padding: 14px 32px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 50px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
        z-index: 100;
        transition: all 0.3s ease;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #ask-button:hover {
        transform: translateX(-50%) translateY(-2px);
        box-shadow: 0 12px 32px rgba(102, 126, 234, 0.6);
      }

      #ask-button:active {
        transform: translateX(-50%) translateY(0);
      }

      #gesture-info {
        position: fixed;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 12px;
        z-index: 99;
        max-width: 200px;
        line-height: 1.4;
      }

      #gesture-info.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="ar-container">
      <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
          <a-asset-item id="courtModel" src="./basketball_court.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
          <a-entity 
            id="model-controller"
            position="0 0 0"
            rotation="0 0 0"
            scale="1 1 1">
            <a-gltf-model 
              id="court-gltf"
              scale="1 1 1"
              position="0 0 0"
              rotation="0 0 0"
              src="#courtModel">
            </a-gltf-model>
          </a-entity>
        </a-entity>
        
      </a-scene>

      <div id="gesture-info">
        💡 Pinch to zoom • Swipe to rotate • 2-finger drag to pan
      </div>

      <a href="https://wa.me/6285956252757" target="_blank" rel="noopener noreferrer" id="ask-button">
        <span>💬</span>
        <span>Ask Me</span>
      </a>
    </div>

    <script>
      // Touch gesture controls
      const modelController = document.getElementById('model-controller');
      let currentScale = 1;
      let currentRotationX = 0;
      let currentRotationY = 0;
      let currentPositionX = 0;
      let currentPositionY = 0;

      let touchStartDistance = 0;
      let lastTouchX = 0;
      let lastTouchY = 0;
      let twoFingerStartX = 0;
      let twoFingerStartY = 0;

      document.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
          // Single finger - prepare for swipe
          lastTouchX = e.touches[0].clientX;
          lastTouchY = e.touches[0].clientY;
        } else if (e.touches.length === 2) {
          // Two fingers
          const touch1 = e.touches[0];
          const touch2 = e.touches[1];
          
          // For pinch zoom
          const dx = touch1.clientX - touch2.clientX;
          const dy = touch1.clientY - touch2.clientY;
          touchStartDistance = Math.sqrt(dx * dx + dy * dy);
          
          // For pan
          const centerX = (touch1.clientX + touch2.clientX) / 2;
          const centerY = (touch1.clientY + touch2.clientY) / 2;
          twoFingerStartX = centerX;
          twoFingerStartY = centerY;
        }
      });

      document.addEventListener('touchmove', (e) => {
        if (e.touches.length === 1) {
          // Single finger swipe - rotate
          const deltaX = e.touches[0].clientX - lastTouchX;
          const deltaY = e.touches[0].clientY - lastTouchY;

          currentRotationY += deltaX * 0.003;
          currentRotationX += deltaY * 0.003;

          updateModelTransform();
          lastTouchX = e.touches[0].clientX;
          lastTouchY = e.touches[0].clientY;
        } else if (e.touches.length === 2) {
          const touch1 = e.touches[0];
          const touch2 = e.touches[1];
          
          // Pinch zoom
          const dx = touch1.clientX - touch2.clientX;
          const dy = touch1.clientY - touch2.clientY;
          const currentDistance = Math.sqrt(dx * dx + dy * dy);
          
          if (touchStartDistance > 0) {
            const scale = currentDistance / touchStartDistance;
            currentScale = Math.max(0.5, Math.min(3, currentScale * scale));
            touchStartDistance = currentDistance;
          }
          
          // Two finger pan
          const centerX = (touch1.clientX + touch2.clientX) / 2;
          const centerY = (touch1.clientY + touch2.clientY) / 2;
          
          const deltaX = (centerX - twoFingerStartX) * 0.003;
          const deltaY = (centerY - twoFingerStartY) * 0.003;
          
          currentPositionX += deltaX;
          currentPositionY -= deltaY;
          
          twoFingerStartX = centerX;
          twoFingerStartY = centerY;
          
          updateModelTransform();
        }
      });

      function updateModelTransform() {
        modelController.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
        modelController.setAttribute('rotation', `${currentRotationX} ${currentRotationY} 0`);
        modelController.setAttribute('position', `${currentPositionX} ${currentPositionY} 0`);
      }

      // Reset on scene loaded
      document.querySelector('a-scene').addEventListener('loaded', () => {
        console.log('AR Scene loaded - gesture controls ready');
      });
    </script>
  </body>
</html>
