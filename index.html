<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tularasa AR Viewer - Debug Mode</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #status { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.7); color: #fbbf24; padding: 10px 20px; border-radius: 20px; z-index: 100; font-family: monospace; }
    #status.detected { color: #4ade80; }
    #ask-button { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 14px 30px; background: #667eea; color: white; border-radius: 50px; font-weight: 600; text-decoration: none; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
  </style>
</head>
<body>
  <a-scene mindar-image="imageTargetSrc: ./targets.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    <a-assets>
      <a-asset-item id="courtModel" src="./basketball_court.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="target">
      <a-entity id="model-controller" rotation="90 0 0" position="0 0 0.1" scale="15 15 15"
                animation="property: rotation; to: 90 360 0; dur: 6000; easing: linear; loop: true">
        
        <a-box position="0 0 0" scale="0.5 0.5 0.5" color="red"></a-box>
        
        <a-gltf-model id="court-gltf" src="#courtModel"></a-gltf-model>
        
      </a-entity>
    </a-entity>
  </a-scene>

  <div id="status">📸 Scanning...</div>
  <a href="https://wa.me/6285956252757" id="ask-button">💬 Ask Me</a>

  <script>
    const controller = document.getElementById('model-controller');
    const target = document.getElementById('target');
    const statusEl = document.getElementById('status');
    let scale = 15, rotX = 90, rotY = 0;

    target.addEventListener('targetFound', () => {
      statusEl.textContent = '✅ Detected'; statusEl.className = 'detected';
      controller.removeAttribute('animation'); 
    });

    target.addEventListener('targetLost', () => {
      statusEl.textContent = '📸 Scanning...'; statusEl.className = '';
      controller.setAttribute('animation', 'property: rotation; to: 90 360 0; dur: 6000; easing: linear; loop: true');
    });

    // Gestures
    let lastX, dist;
    document.addEventListener('touchmove', (e) => {
      if (e.touches.length === 1) {
        rotY += (e.touches[0].clientX - (lastX || e.touches[0].clientX)) * 0.5;
        lastX = e.touches[0].clientX;
        controller.setAttribute('rotation', `${rotX} ${rotY} 0`);
      } else if (e.touches.length === 2) {
        const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        if (dist) scale *= (d / dist);
        dist = d;
        scale = Math.min(Math.max(scale, 1), 100); // Batas aman zoom
        controller.setAttribute('scale', `${scale} ${scale} ${scale}`);
      }
    });
    document.addEventListener('touchend', () => { lastX = null; dist = null; });
  </script>
</body>
</html>
