<!DOCTYPE html>
<html>
  <head>
    <title>Tularasa AR Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body { margin: 0; overflow: hidden; touch-action: none; }
      #ask-button { position: fixed; bottom: 30px; left: 5%; width: 90%; padding: 14px 0; border-radius: 50px; font-weight: bold; font-size: 16px; text-align: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 100; }
    </style>
  </head>
  <body>
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;" renderer="colorManagement: true" vr-mode-ui="enabled: false">
      
      <a-marker type="pattern" url="./pattern-marker.patt">
        
        <a-entity id="model-controller" rotation="0 0 0" position="0 0 0" scale="3 3 3">
          <a-gltf-model src="https://raw.githubusercontent.com/mrmandrian/arvi/main/ujang.glb"></a-gltf-model>
        </a-entity>

      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>

    <a href="https://wa.me/6285956252757" id="ask-button">💬 Ask Me</a>

    <script>
      const controller = document.getElementById('model-controller');
      let scale = 2;
      let rotY = 0;
      let lastX, dist;

      // Gestur Pinch & Swipe
      document.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (e.touches.length === 1) {
          rotY += (e.touches[0].clientX - (lastX || e.touches[0].clientX)) * 0.5;
          lastX = e.touches[0].clientX;
          // Putar hanya di sumbu Y (kiri-kanan) agar tetap rebahan
          controller.setAttribute('rotation', `-90 ${rotY} 0`);
        } else if (e.touches.length === 2) {
          const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
          if (dist) {
            scale *= (d / dist);
            scale = Math.min(Math.max(scale, 0.5), 20);
          }
          dist = d;
          controller.setAttribute('scale', `${scale} ${scale} ${scale}`);
        }
      }, { passive: false });

      document.addEventListener('touchend', () => { lastX = null; dist = null; });
    </script>
  </body>
</html>
