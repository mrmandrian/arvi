<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>ARVI Core Engine - Syaira Production PoC</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Arial, sans-serif; }
        
        /* Premium Minimalist Aero Interface Overlay (Standard seeyouwhen Vibe) */
        #arvi-ui {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 9999;
            width: 90%; max-width: 400px; background: rgba(255, 255, 255, 0.93);
            padding: 16px; border-radius: 20px; box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            text-align: center; pointer-events: auto; display: none;
        }
        .ui-title { margin: 0 0 12px 0; font-size: 12px; color: #1e3a8a; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; }
        .btn-container { display: flex; gap: 8px; justify-content: center; }
        .variance-btn {
            flex: 1; padding: 12px 6px; border: 2px solid #2563eb; background: white;
            color: #2563eb; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 11px;
            transition: all 0.2s ease;
        }
        .variance-btn.active { background: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        
        /* Ramping Loading Screen Layer */
        #arvi-loading {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #0f172a; color: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 99999;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1);
            border-left-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="arvi-loading">
        <div class="spinner"></div>
        <h3 style="margin: 0; letter-spacing: 2px; font-weight: 800;">ARVI ENGINE</h3>
        <p style="color: #64748b; font-size: 12px; margin: 5px 0 0 0;">Mengekstrak Fitur Piksel Denah...</p>
    </div>

    <div id="arvi-ui">
        <div class="ui-title">ARVI Variance Control</div>
        <div class="btn-container">
            <button class="variance-btn active" onclick="switchVariance('normal', this)">Normal View</button>
            <button class="variance-btn" onclick="switchVariance('wireframe', this)">Wireframe</button>
            <button class="variance-btn" onclick="switchVariance('ghost', this)">Ghost View</button>
        </div>
    </div>

    <a-scene mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/merdyandrian/assets@main/court-qr-targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: yes;" 
             embedded color-space="sRGB" renderer="colorManagement: true, sortObjects: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="court-model" src="./basketball_court.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity 
                id="target-model"
                gltf-model="#court-model" 
                scale="0.08 0.08 0.08" 
                position="0 0 0"
                rotation="90 0 0">
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        // Logika penghilangan loading screen setelah GPU WebGL siap menampilkan live feed kamera
        document.addEventListener("DOMContentLoaded", () => {
            const sceneEl = document.querySelector('a-scene');
            sceneEl.addEventListener("arReady", (event) => {
                document.getElementById('arvi-loading').style.display = 'none';
                document.getElementById('arvi-ui').style.display = 'block';
            });
        });

        // Kontrol Manipulasi Material GPU untuk Variansi Produk Real-Time
        function switchVariance(type, buttonElement) {
            const buttons = document.querySelectorAll('.variance-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');

            const modelEntity = document.getElementById('target-model');
            const mesh = modelEntity.getObject3D('mesh');

            if (!mesh) return;

            mesh.traverse((node) => {
                if (node.isMesh) {
                    // Caching material asli produk bawaan file .glb lo
                    if (!node.userData.originalMaterial) {
                        node.userData.originalMaterial = node.material.clone();
                    }

                    if (type === 'wireframe') {
                        // Variansi 1: Wireframe View (Mengubah objek menjadi rangka garis hijau neon tanpa ganti file)
                        node.material = new THREE.MeshBasicMaterial({
                            color: 0x00ff00,
                            wireframe: true
                        });
                    } else if (type === 'ghost') {
                        // Variansi 2: Ghost View (Mengubah objek menjadi transparan semi tembus pandang)
                        node.material = node.userData.originalMaterial.clone();
                        node.material.transparent = true;
                        node.material.opacity = 0.25;
                    } else {
                        // Tampilan Awal: Mengembalikan ke material asli produk Syaira
                        node.material = node.userData.originalMaterial;
                    }
                }
            });
        }
    </script>
</body>
</html>
