<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>ARVI Premium Engine - Syaira Core</title>
    
    <!-- A-Frame and MindAR Scripts -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-aframe.prod.js"></script>
    
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #020617; 
            font-family: 'Outfit', Arial, sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Premium Glassmorphic Control Overlay */
        #arvi-ui {
            position: absolute; 
            bottom: 40px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 9999;
            width: 90%; 
            max-width: 420px; 
            background: rgba(15, 23, 42, 0.75);
            padding: 20px; 
            border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px) saturate(180%); 
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center; 
            pointer-events: auto; 
            display: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Header / System Status */
        .ui-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .ui-title { 
            margin: 0; 
            font-size: 11px; 
            color: #94a3b8; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-family: 'Share Tech Mono', monospace;
        }
        
        /* Glowing Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 800;
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        
        .status-badge.scanning {
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.3);
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.1);
        }
        .status-badge.scanning .dot {
            width: 6px; height: 6px; background: #fbbf24; border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        
        .status-badge.locked {
            background: rgba(20, 184, 166, 0.15);
            color: #2dd4bf;
            border: 1px solid rgba(20, 184, 166, 0.3);
            box-shadow: 0 0 12px rgba(20, 184, 166, 0.2);
        }
        .status-badge.locked .dot {
            width: 6px; height: 6px; background: #2dd4bf; border-radius: 50%;
            box-shadow: 0 0 6px #2dd4bf;
        }
        
        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.5; }
        }
        
        /* Grid Buttons layout */
        .btn-container { display: flex; gap: 10px; justify-content: center; }
        
        .variance-btn {
            flex: 1; 
            padding: 12px 8px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            background: rgba(255, 255, 255, 0.03);
            color: #cbd5e1; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 11px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .variance-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #f8fafc;
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        .variance-btn.active { 
            background: #2563eb; 
            color: white; 
            border-color: #3b82f6;
            box-shadow: 0 0 16px rgba(37, 99, 235, 0.4); 
            font-weight: 800;
        }
        
        /* Dark Loading Screen */
        #arvi-loading {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh;
            background: #020617; 
            color: white; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            z-index: 99999;
        }
        
        .spinner {
            width: 48px; 
            height: 48px; 
            border: 3px solid rgba(255,255,255,0.05);
            border-left-color: #3b82f6; 
            border-radius: 50%; 
            animation: spin 0.8s cubic-bezier(0.5, 0.1, 0.1, 0.9) infinite;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.1);
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .loading-title {
            margin: 0; 
            letter-spacing: 4px; 
            font-weight: 800; 
            font-size: 16px;
            font-family: 'Share Tech Mono', monospace;
            background: linear-gradient(135deg, #f8fafc 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .loading-subtitle {
            color: #64748b; 
            font-size: 11px; 
            margin: 8px 0 0 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- Loading Screen (Kamera & WebGL Init) -->
    <div id="arvi-loading">
        <div class="spinner"></div>
        <h3 class="loading-title">ARVI ENGINE</h3>
        <p class="loading-subtitle">Initializing AR Camera Feed...</p>
    </div>

    <!-- Glass UI Controls -->
    <div id="arvi-ui">
        <div class="ui-header">
            <div class="ui-title">SYAIRA CORE // ENGINE V1.0</div>
            <div id="status-badge" class="status-badge scanning">
                <span class="dot"></span>
                <span id="status-text">SCANNING</span>
            </div>
        </div>
        <div class="btn-container">
            <button class="variance-btn active" onclick="switchVariance('normal', this)">Normal View</button>
            <button class="variance-btn" onclick="switchVariance('wireframe', this)">Wireframe</button>
            <button class="variance-btn" onclick="switchVariance('ghost', this)">Ghost View</button>
        </div>
    </div>

    <!-- MindAR A-Scene -->
    <!-- Using locally compiled targets.mind and basketball_court.glb -->
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: yes;" 
             embedded 
             color-space="sRGB" 
             renderer="colorManagement: true, sortObjects: true" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="court-model" src="./basketball_court.glb" crossOrigin="anonymous"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- Target Anchor Index 0 -->
        <a-entity id="target-anchor" mindar-image-target="targetIndex: 0">
            <!-- 
              Basketball Court 3D Model:
              - rotation="0 0 90" maps the model's flat plane (X-Y) 1:1 onto the portrait target image.
              - scale="0.0015 0.0015 0.0015" scales the raw model (width ~480, length ~948) 
                perfectly to match the tracker image size (1.0 x 1.5).
            -->
            <a-entity 
                id="target-model"
                gltf-model="#court-model" 
                scale="0.0015 0.0015 0.0015" 
                position="0 0 0"
                rotation="0 0 90">
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        // Global engine states
        const state = {
            currentVariance: 'normal',
            targetFound: false,
            modelLoaded: false
        };

        // References to objects
        let modelMesh = null;
        const originalMaterials = new Map();

        const modelEntity = document.getElementById('target-model');
        const anchorEntity = document.getElementById('target-anchor');
        const statusBadge = document.getElementById('status-badge');
        const statusText = document.getElementById('status-text');

        // Initialize UI display when MindAR is ready
        document.addEventListener("DOMContentLoaded", () => {
            const sceneEl = document.querySelector('a-scene');
            sceneEl.addEventListener("arReady", (event) => {
                document.getElementById('arvi-loading').style.display = 'none';
                document.getElementById('arvi-ui').style.display = 'block';
            });
        });

        // 1. Model Loading event - cache materials and resolve initial load state
        modelEntity.addEventListener('model-loaded', () => {
            console.log("3D Model successfully parsed and loaded to GPU.");
            state.modelLoaded = true;
            modelMesh = modelEntity.getObject3D('mesh');
            
            if (modelMesh) {
                // Traverse all children and save their standard material references
                modelMesh.traverse((node) => {
                    if (node.isMesh) {
                        if (!originalMaterials.has(node.uuid)) {
                            originalMaterials.set(node.uuid, node.material.clone());
                        }
                    }
                });
                
                // If the user selected a variance before loading finished, apply it now
                applyVariance(state.currentVariance);
            }
        });

        // 2. Tracking: Target Found event
        anchorEntity.addEventListener('targetFound', () => {
            state.targetFound = true;
            console.log("Target Locked - Rendering Stadium.");
            
            // Update UI status badge to LOCKED
            statusBadge.className = 'status-badge locked';
            statusText.innerText = 'LOCKED';
        });

        // 3. Tracking: Target Lost event
        anchorEntity.addEventListener('targetLost', () => {
            state.targetFound = false;
            console.log("Target Lost - Pausing tracking anchor.");
            
            // Update UI status badge to SCANNING
            statusBadge.className = 'status-badge scanning';
            statusText.innerText = 'SCANNING';
        });

        // User Trigger: Switch material variance state
        function switchVariance(type, buttonElement) {
            // Update button styles in UI
            const buttons = document.querySelectorAll('.variance-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            if (buttonElement) {
                buttonElement.classList.add('active');
            }

            state.currentVariance = type;
            
            // Apply immediately if mesh is already loaded
            if (state.modelLoaded) {
                applyVariance(type);
            }
        }

        // Apply material variance to GPU buffers
        function applyVariance(type) {
            if (!modelMesh) return;

            modelMesh.traverse((node) => {
                if (node.isMesh) {
                    const originalMat = originalMaterials.get(node.uuid);
                    if (!originalMat) return;

                    if (type === 'wireframe') {
                        // Premium electric neon cyan wireframe
                        node.material = new THREE.MeshBasicMaterial({
                            color: 0x2dd4bf,
                            wireframe: true
                        });
                    } else if (type === 'ghost') {
                        // Semitransparent original material
                        node.material = originalMat.clone();
                        node.material.transparent = true;
                        node.material.opacity = 0.2;
                    } else {
                        // Restore default glTF textures and materials
                        node.material = originalMat;
                    }
                }
            });
        }
    </script>
</body>
</html>
