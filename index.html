<!DOCTYPE html>
<html>
  <head>
    <title>Tularasa AR Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; touch-action: none; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      #top-logo { position: fixed; top: 20px; left: 20px; width: 120px; height: auto; z-index: 99; pointer-events: none; }
      
      /* HUD Pojok Kiri Bawah */
      #rot-hud {
        position: fixed; bottom: 10px; left: 10px; color: rgba(255, 255, 255, 0.7);
        font-size: 8px; font-family: monospace; z-index: 99; pointer-events: none;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.8); background: rgba(0, 0, 0, 0.3);
        padding: 4px 6px; border-radius: 4px;
      }

      #loader-container { 
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
        background: rgba(0, 0, 0, 0.85); z-index: 999; 
        display: flex; flex-direction: column; justify-content: center; align-items: center; 
      }
      #loader-svg { width: 150px; height: auto; animation: spin 2s linear infinite; }
      @keyframes spin { 100% { transform: rotate(360deg); } }

      #ask-button { 
        position: fixed; bottom: 30px; left: 5%; width: 90%; padding: 14px 0; 
        border-radius: 50px; font-weight: bold; font-size: 16px; text-align: center; 
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; 
        text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 100; 
      }
      #model-selector { position: fixed; bottom: 90px; left: 5%; width: 90%; display: flex; gap: 5px; z-index: 100; justify-content: space-between; }
      .model-btn { flex: 1; padding: 12px 0; background: #a3e635; color: white; border: none; border-radius: 30px; font-size: 16px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; transition: transform 0.1s, background 0.3s; }
      .model-btn:active { transform: scale(0.95); }
      .model-btn.active { background: #65a30d; box-shadow: inset 0 2px 5px rgba(0,0,0,0.2); }

      /* BOLA CONTROLLER */
      #virtual-controller {
        position: fixed; top: 20px; right: 20px; width: 30px; height: 30px;
        z-index: 99; display: flex; justify-content: center; align-items: center; touch-action: none;
      }
      #joystick-base {
        width: 100%; height: 100%; background: rgba(255, 255, 255, 0.1);
        border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 50%; position: absolute;
      }
      #joystick-knob {
        width: 15px; height: 15px; background: linear-gradient(135deg, #a3e635 0%, #65a30d 100%);
        border: 1px solid white; border-radius: 50%; position: absolute;
        cursor: grab; box-shadow: 0 2px 5px rgba(0,0,0,0.3); transition: transform 0.1s ease-out;
      }
      #joystick-knob:active { cursor: grabbing; }
    </style>
  </head>
  <body>
    <div id="loader-container"><img id="loader-svg" src="https://raw.githubusercontent.com/mrmandrian/arvi/main/Abstraction.svg" alt="Loading..."></div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;" renderer="colorManagement: true" vr-mode-ui="enabled: false">
      <a-marker type="pattern" url="./pattern-qr-code-styling.patt" smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
        <a-entity id="model-controller" rotation="0 0 0" position="0 0 0" scale="1 1 1">
          <a-gltf-model id="active-model" src="https://raw.githubusercontent.com/mrmandrian/arvi/main/ujang.glb"></a-gltf-model>
        </a-entity>
      </a-marker>
      <a-entity camera near="0.001" far="10000"></a-entity>
    </a-scene>

    <img id="top-logo" src="https://raw.githubusercontent.com/mrmandrian/arvi/main/tularasa_fin_Finale%20material.svg" alt="Tularasa Logo">
    
    <div id="rot-hud">Rot: 0 0 0 | Zoom: 1.0</div>

    <div id="virtual-controller">
      <div id="joystick-base"></div>
      <div id="joystick-knob"></div>
    </div>

    <div id="model-selector">
      <button class="model-btn active" onclick="changeModel(1, this)">1</button>
      <button class="model-btn" onclick="changeModel(2, this)">2</button>
      <button class="model-btn" onclick="changeModel(3, this)">3</button>
      <button class="model-btn" onclick="changeModel(4, this)">4</button>
      <button class="model-btn" onclick="changeModel(5, this)">5</button>
    </div>

    <a href="https://wa.me/6285956252757" id="ask-button">💬 Ask Me</a>

    <script>
      const controller = document.getElementById('model-controller');
      const activeModel = document.getElementById('active-model');
      const rotHud = document.getElementById('rot-hud');
      const loaderContainer = document.getElementById('loader-container');
      
      let currentModelId = 1; 
      let scale = 1; 
      let baseRotX = 0; 
      let currentRotX = 0; 
      let rotY = 0;
      let lastX, lastY, dist, lastTap = 0; 
      let hasMoved = false;

      // KONFIGURASI MODEL
      const models = {
        1: { url: "https://raw.githubusercontent.com/mrmandrian/arvi/main/ujang.glb", initScale: 2, initRotX: 0, allowRotX: false, allowRotY: true },
        2: { url: "https://raw.githubusercontent.com/mrmandrian/arvi/main/lowpoly_house.glb", initScale: 0.5, initRotX: 0, allowRotX: false, allowRotY: true },
        3: { url: "https://raw.githubusercontent.com/mrmandrian/arvi/main/hiking_boots_lowpoly.glb", initScale: 1, initRotX: 0, allowRotX: true, allowRotY: true },
        4: { url: "https://raw.githubusercontent.com/mrmandrian/arvi/main/motocross_helmet_final.glb", initScale: 0.5, initRotX: 0, allowRotX: true, allowRotY: true },
        5: { url: "https://raw.githubusercontent.com/mrmandrian/arvi/main/low-poly_truck_car_drifter.glb", initScale: 0.05, initRotX: 0, allowRotX: false, allowRotY: true }
      };

      function updateHUD() {
        rotHud.textContent = `Rot: ${Math.round(currentRotX)} ${Math.round(rotY)} 0 | Zoom: ${scale.toFixed(1)}`;
      }

      activeModel.addEventListener('model-loaded', () => { loaderContainer.style.display = 'none'; });
      activeModel.addEventListener('model-error', () => { loaderContainer.style.display = 'none'; console.error("Model gagal dimuat!"); });

      window.changeModel = function(modelId, btnElement) {
        loaderContainer.style.display = 'flex';
        currentModelId = modelId;
        const config = models[modelId];

        activeModel.setAttribute('src', config.url);
        scale = config.initScale;
        baseRotX = config.initRotX;
        currentRotX = baseRotX; 
        rotY = 0;
        
        controller.setAttribute('scale', `${scale} ${scale} ${scale}`);
        controller.setAttribute('rotation', `${currentRotX} 0 0`);
        updateHUD();

        document.querySelectorAll('.model-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
      };

      // GESTURE TOUCH SCREEN (MOBILE)
      document.addEventListener('touchstart', (e) => {
        hasMoved = false; 
      }, { passive: true });

      document.addEventListener('touchmove', (e) => {
        if(e.target.closest('#virtual-controller') || e.target.closest('#model-selector') || e.target.closest('#ask-button')) return;
        
        e.preventDefault(); 
        hasMoved = true; 
        
        if (e.touches.length === 1) {
          const config = models[currentModelId];
          if (config.allowRotY) rotY += (e.touches[0].clientX - (lastX || e.touches[0].clientX)) * 0.5;
          if (config.allowRotX) currentRotX += (e.touches[0].clientY - (lastY || e.touches[0].clientY)) * 0.5;
          
          lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; 
          controller.setAttribute('rotation', `${currentRotX} ${rotY} 0`);
          updateHUD();
        } else if (e.touches.length === 2) {
          const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
          if (dist) {
            scale *= (d / dist);
            const base = models[currentModelId].initScale;
            scale = Math.min(Math.max(scale, base * 0.1), base * 5); 
          }
          dist = d; controller.setAttribute('scale', `${scale} ${scale} ${scale}`);
          updateHUD(); 
        }
      }, { passive: false });

      document.addEventListener('touchend', (e) => { 
        lastX = null; lastY = null; dist = null; 
        const currentTime = new Date().getTime();
        
        if (!hasMoved && currentTime - lastTap < 300 && e.touches.length === 0) {
          scale = models[currentModelId].initScale;
          currentRotX = models[currentModelId].initRotX; rotY = 0;
          controller.setAttribute('scale', `${scale} ${scale} ${scale}`);
          controller.setAttribute('rotation', `${currentRotX} 0 0`);
          updateHUD();
        }
        lastTap = currentTime;
      });
      
      // VIRTUAL CONTROLLER
      const controllerKnob = document.getElementById('joystick-knob');
      let isDraggingKnob = false;
      let knobStartX, knobStartY;
      const knobMaxOffset = 10; 
      
      function initVirtualController() {
        controllerKnob.addEventListener('mousedown', onKnobStart);
        window.addEventListener('mousemove', onKnobMove);
        window.addEventListener('mouseup', onKnobEnd);

        controllerKnob.addEventListener('touchstart', (e) => { e.preventDefault(); onKnobStart(e.touches[0]); });
        window.addEventListener('touchmove', (e) => { if(isDraggingKnob) e.preventDefault(); onKnobMove(e.touches[0]); }, { passive: false });
        window.addEventListener('touchend', onKnobEnd);
      }

      function onKnobStart(e) {
        isDraggingKnob = true;
        knobStartX = e.clientX; knobStartY = e.clientY;
        controllerKnob.style.transition = 'none'; 
      }

      function onKnobMove(e) {
        if (!isDraggingKnob) return;

        let offsetX = e.clientX - knobStartX;
        let offsetY = e.clientY - knobStartY;

        let distance = Math.sqrt(offsetX * offsetX + offsetY * offsetY);
        if (distance > knobMaxOffset) {
          let angle = Math.atan2(offsetY, offsetX);
          offsetX = knobMaxOffset * Math.cos(angle);
          offsetY = knobMaxOffset * Math.sin(angle);
        }

        controllerKnob.style.transform = `translate(${offsetX}px, ${offsetY}px)`;

        // UPDATE 3: Joystick mematuhi rules allowRotX dan allowRotY
        const config = models[currentModelId];
        if (config.allowRotX) {
          currentRotX -= (offsetY / knobMaxOffset) * 3; 
        }
        if (config.allowRotY) {
          rotY += (offsetX / knobMaxOffset) * 3; 
        }

        controller.setAttribute('rotation', `${currentRotX} ${rotY} 0`);
        updateHUD();
      }

      function onKnobEnd() {
        isDraggingKnob = false;
        controllerKnob.style.transition = 'transform 0.1s ease-out'; 
        controllerKnob.style.transform = 'translate(0, 0)'; 
      }

      initVirtualController();

      // INIT
      scale = models[1].initScale;
      currentRotX = models[1].initRotX;
      controller.setAttribute('scale', `${scale} ${scale} ${scale}`);
      controller.setAttribute('rotation', `${currentRotX} 0 0`);
      updateHUD();
    </script>
  </body>
</html>
