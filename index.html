<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tularasa AR Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      #camera-feed {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
      }

      #canvas-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      #gesture-info {
        position: fixed;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.8);
        color: white;
        padding: 14px 18px;
        border-radius: 8px;
        font-size: 13px;
        z-index: 99;
        max-width: 240px;
        line-height: 1.5;
        font-weight: 500;
        border-left: 3px solid #667eea;
      }

      #status {
        position: fixed;
        top: 20px;
        right: 20px;
        background: rgba(0, 0, 0, 0.8);
        color: #fbbf24;
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 12px;
        z-index: 99;
        font-family: monospace;
        min-width: 140px;
        text-align: center;
        border: 1px solid #fbbf24;
      }

      #status.detected {
        color: #4ade80;
        border-color: #4ade80;
      }

      #status.lost {
        color: #ef4444;
        border-color: #ef4444;
      }

      #status.ready {
        color: #60a5fa;
        border-color: #60a5fa;
      }

      .marker-hint {
        position: fixed;
        bottom: 100px;
        right: 20px;
        background: rgba(0, 0, 0, 0.8);
        color: #93c5fd;
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 12px;
        z-index: 98;
        max-width: 180px;
        line-height: 1.4;
        text-align: center;
      }

      #ask-button {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        padding: 14px 32px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 50px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
        z-index: 100;
        transition: all 0.3s ease;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #ask-button:hover {
        transform: translateX(-50%) translateY(-2px);
        box-shadow: 0 12px 32px rgba(102, 126, 234, 0.6);
      }
    </style>
  </head>
  <body>
    <video id="camera-feed" playsinline autoplay muted></video>
    <div id="canvas-container"></div>

    <div id="gesture-info">
      📍 QR Marker AR<br>
      <br>
      👆 Rotate<br>
      🤏 Pinch zoom<br>
      👐 Pan<br>
      <br>
      💡 Double tap: reset
    </div>

    <div id="status">
      ⏳ Loading camera...
    </div>

    <div class="marker-hint">
      📸 Point at QR code
    </div>

    <a href="https://wa.me/6285956252757" target="_blank" rel="noopener noreferrer" id="ask-button">
      <span>💬</span>
      <span>Ask Me</span>
    </a>

    <script>
      // Setup Three.js scene
      let scene, camera, renderer, model;
      let modelController = null;
      const statusEl = document.getElementById('status');
      const canvasContainer = document.getElementById('canvas-container');
      
      // Model transformation state
      let currentScale = 1;
      let currentRotationX = 0;
      let currentRotationY = 0;
      let currentPositionX = 0;
      let currentPositionY = 0;
      let markerDetected = false;
      let modelLoaded = false;

      // Touch tracking
      let touchStartDistance = 0;
      let lastTouchX = 0;
      let lastTouchY = 0;
      let twoFingerStartX = 0;
      let twoFingerStartY = 0;
      let isMultiTouch = false;

      // Initialize Three.js
      function initThree() {
        scene = new THREE.Scene();
        scene.background = null;

        camera = new THREE.PerspectiveCamera(
          75,
          window.innerWidth / window.innerHeight,
          0.1,
          1000
        );
        camera.position.z = 5;

        renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0);
        canvasContainer.appendChild(renderer.domElement);

        // Add lighting
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        // Load glTF model with timeout
        const loader = new THREE.GLTFLoader();
        const modelLoadTimeout = setTimeout(() => {
          console.error('❌ Model load timeout (15s)');
          statusEl.textContent = '❌ Model Timeout';
          statusEl.className = 'lost';
          modelLoaded = true; // Mark as attempted
        }, 15000);

        loader.load(
          './basketball_court.glb',
          (gltf) => {
            clearTimeout(modelLoadTimeout);
            model = gltf.scene;
            model.position.set(0, 0, 0);
            model.scale.set(1, 1, 1);
            model.visible = false; // Hide until QR detected
            modelController = model;
            scene.add(model);
            modelLoaded = true;
            console.log('✅ Model loaded');
            statusEl.textContent = '📸 Ready';
            statusEl.className = 'ready';
          },
          (progress) => {
            const percent = Math.round((progress.loaded / progress.total) * 100);
            statusEl.textContent = `⏳ ${percent}%`;
          },
          (error) => {
            clearTimeout(modelLoadTimeout);
            console.error('❌ Model load error:', error);
            statusEl.textContent = '❌ Model Error';
            statusEl.className = 'lost';
            modelLoaded = true;
          }
        );

        // Handle window resize
        window.addEventListener('resize', () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
      }

      // Animation loop
      function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
      }

      // Initialize camera feed
      async function initCamera() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
          });

          const video = document.getElementById('camera-feed');
          video.srcObject = stream;
          video.addEventListener('loadedmetadata', () => {
            console.log('✅ Camera started');
            if (!modelLoaded) {
              statusEl.textContent = '⏳ Loading model...';
            }
            
            // Start QR detection
            detectQRCode(video);
          });

        } catch (error) {
          console.error('❌ Camera error:', error);
          statusEl.textContent = '❌ Camera Denied';
          statusEl.className = 'lost';
        }
      }

      // QR Code detection
      function detectQRCode(video) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        
        function scan() {
          if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height, {
              inversionAttempts: 2,
            });

            if (code && code.data === '0') {
              if (!markerDetected && modelLoaded) {
                markerDetected = true;
                if (modelController) modelController.visible = true;
                statusEl.textContent = '✅ QR Detected';
                statusEl.className = 'detected';
                console.log('✅ QR Detected');
              }
            } else {
              if (markerDetected) {
                markerDetected = false;
                if (modelController) modelController.visible = false;
                statusEl.textContent = '📸 Ready';
                statusEl.className = 'ready';
                resetTransform();
                console.log('❌ QR Lost');
              }
            }
          }
          requestAnimationFrame(scan);
        }
        scan();
      }

      // Touch controls
      document.addEventListener('touchstart', (e) => {
        if (!markerDetected) return;

        if (e.touches.length === 1) {
          lastTouchX = e.touches[0].clientX;
          lastTouchY = e.touches[0].clientY;
          isMultiTouch = false;
        } else if (e.touches.length === 2) {
          isMultiTouch = true;
          const touch1 = e.touches[0];
          const touch2 = e.touches[1];
          
          const dx = touch1.clientX - touch2.clientX;
          const dy = touch1.clientY - touch2.clientY;
          touchStartDistance = Math.sqrt(dx * dx + dy * dy);
          
          twoFingerStartX = (touch1.clientX + touch2.clientX) / 2;
          twoFingerStartY = (touch1.clientY + touch2.clientY) / 2;
        }

        e.preventDefault();
      }, { passive: false });

      document.addEventListener('touchmove', (e) => {
        if (!markerDetected || !modelController) return;

        if (e.touches.length === 1 && !isMultiTouch) {
          const currentX = e.touches[0].clientX;
          const currentY = e.touches[0].clientY;
          
          const deltaX = currentX - lastTouchX;
          const deltaY = currentY - lastTouchY;

          currentRotationY += deltaX * 0.01;
          currentRotationX += deltaY * 0.01;

          updateModelTransform();
          lastTouchX = currentX;
          lastTouchY = currentY;
        } 
        else if (e.touches.length === 2) {
          const touch1 = e.touches[0];
          const touch2 = e.touches[1];
          
          const dx = touch1.clientX - touch2.clientX;
          const dy = touch1.clientY - touch2.clientY;
          const currentDistance = Math.sqrt(dx * dx + dy * dy);
          
          if (touchStartDistance > 0) {
            const scaleFactor = currentDistance / touchStartDistance;
            const newScale = currentScale * scaleFactor;
            currentScale = Math.max(0.5, Math.min(3, newScale));
            touchStartDistance = currentDistance;
          }
          
          const centerX = (touch1.clientX + touch2.clientX) / 2;
          const centerY = (touch1.clientY + touch2.clientY) / 2;
          
          const panDeltaX = (centerX - twoFingerStartX) * 0.01;
          const panDeltaY = (centerY - twoFingerStartY) * 0.01;
          
          currentPositionX += panDeltaX;
          currentPositionY -= panDeltaY;
          
          twoFingerStartX = centerX;
          twoFingerStartY = centerY;
          
          updateModelTransform();
        }

        e.preventDefault();
      }, { passive: false });

      document.addEventListener('touchend', (e) => {
        if (e.touches.length === 0) {
          isMultiTouch = false;
          touchStartDistance = 0;
        }
      }, { passive: false });

      function updateModelTransform() {
        if (!modelController) return;
        
        modelController.scale.set(currentScale, currentScale, currentScale);
        modelController.rotation.x = currentRotationX;
        modelController.rotation.y = currentRotationY;
        modelController.position.x = currentPositionX;
        modelController.position.y = currentPositionY;
      }

      function resetTransform() {
        currentScale = 1;
        currentRotationX = 0;
        currentRotationY = 0;
        currentPositionX = 0;
        currentPositionY = 0;
        updateModelTransform();
      }

      // Double tap to reset
      let lastTap = 0;
      document.addEventListener('touchend', (e) => {
        const currentTime = new Date().getTime();
        const tapLength = currentTime - lastTap;
        
        if (tapLength < 300 && tapLength > 0 && e.touches.length === 0 && markerDetected) {
          resetTransform();
          console.log('🔄 Reset via double tap');
        }
        lastTap = currentTime;
      });

      // Initialize
      initThree();
      initCamera();
    </script>
  </body>
</html>
