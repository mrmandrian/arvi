<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tularasa AR Viewer</title>
    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- AR.js -->
    <script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.5/three.js/ar.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      #ar-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      a-scene {
        width: 100% !important;
        height: 100% !important;
        display: block !important;
      }

      /* Ensure the canvas takes full screen */
      canvas {
        width: 100% !important;
        height: 100% !important;
        display: block !important;
      }

      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      #ask-button {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        padding: 14px 32px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 50px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
        z-index: 100;
        transition: all 0.3s ease;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #ask-button:hover {
        transform: translateX(-50%) translateY(-2px);
        box-shadow: 0 12px 32px rgba(102, 126, 234, 0.6);
      }

      #gesture-info {
        position: fixed;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.8);
        color: white;
        padding: 14px 18px;
        border-radius: 8px;
        font-size: 13px;
        z-index: 99;
        max-width: 240px;
        line-height: 1.5;
        font-weight: 500;
        border-left: 3px solid #667eea;
      }

      #status {
        position: fixed;
        top: 20px;
        right: 20px;
        background: rgba(0, 0, 0, 0.8);
        color: #fbbf24;
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 12px;
        z-index: 99;
        font-family: monospace;
        min-width: 140px;
        text-align: center;
        border: 1px solid #fbbf24;
      }

      #status.detected {
        color: #4ade80;
        border-color: #4ade80;
      }

      #status.lost {
        color: #ef4444;
        border-color: #ef4444;
      }

      .marker-hint {
        position: fixed;
        bottom: 100px;
        right: 20px;
        background: rgba(0, 0, 0, 0.8);
        color: #93c5fd;
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 12px;
        z-index: 98;
        max-width: 180px;
        line-height: 1.4;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="ar-container">
      <a-scene 
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono;"
        renderer="antialias: true; alpha: true; precision: medium; preserveDrawingBuffer: true;"
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false"
        background="color: #000000">
        
        <a-assets timeout="30000">
          <a-asset-item id="courtModel" src="./basketball_court.glb"></a-asset-item>
        </a-assets>

        <a-camera-static></a-camera-static>

        <!-- QR Code Marker (value 0) -->
        <a-marker 
          type="barcode" 
          value="0"
          id="qr-marker"
          emitevents="true"
          smooth="true"
          smoothcount="10">
          <a-entity 
            id="model-controller"
            position="0 0 0"
            rotation="0 0 0"
            scale="1 1 1">
            <a-gltf-model 
              id="court-gltf"
              scale="1 1 1"
              position="0 0 0"
              rotation="0 0 0"
              src="#courtModel">
            </a-gltf-model>
          </a-entity>
        </a-marker>
        
      </a-scene>
    </div>

    <div id="gesture-info">
      📍 QR Marker AR<br>
      <br>
      👆 Rotate<br>
      🤏 Pinch zoom<br>
      👐 Pan<br>
      <br>
      💡 Double tap: reset
    </div>

    <div id="status">
      ⏳ Loading...
    </div>

    <div class="marker-hint">
      📸 Point at QR code
    </div>

    <a href="https://wa.me/6285956252757" target="_blank" rel="noopener noreferrer" id="ask-button">
      <span>💬</span>
      <span>Ask Me</span>
    </a>

    <script>
      // Model transformation state
      let modelController = null;
      const qrMarker = document.getElementById('qr-marker');
      const statusEl = document.getElementById('status');
      
      let currentScale = 1;
      let currentRotationX = 0;
      let currentRotationY = 0;
      let currentPositionX = 0;
      let currentPositionY = 0;

      // Touch tracking
      let touchStartDistance = 0;
      let lastTouchX = 0;
      let lastTouchY = 0;
      let twoFingerStartX = 0;
      let twoFingerStartY = 0;
      let isMultiTouch = false;
      let markerDetected = false;

      // Wait for model controller to be available
      function getModelController() {
        if (!modelController) {
          modelController = document.getElementById('model-controller');
        }
        return modelController;
      }

      // Marker detection listeners
      qrMarker.addEventListener('markerFound', (event) => {
        markerDetected = true;
        getModelController();
        statusEl.textContent = '✅ QR Detected';
        statusEl.className = 'detected';
        console.log('✅ QR Marker found');
      });

      qrMarker.addEventListener('markerLost', (event) => {
        markerDetected = false;
        statusEl.textContent = '❌ QR Lost';
        statusEl.className = 'lost';
        resetTransform();
        console.log('❌ QR Marker lost');
      });

      // Prevent default scrolling
      document.addEventListener('touchmove', (e) => {
        if (markerDetected) {
          e.preventDefault();
        }
      }, { passive: false });

      // Touch start
      document.addEventListener('touchstart', (e) => {
        if (!markerDetected) return;

        if (e.touches.length === 1) {
          lastTouchX = e.touches[0].clientX;
          lastTouchY = e.touches[0].clientY;
          isMultiTouch = false;
        } else if (e.touches.length === 2) {
          isMultiTouch = true;
          const touch1 = e.touches[0];
          const touch2 = e.touches[1];
          
          const dx = touch1.clientX - touch2.clientX;
          const dy = touch1.clientY - touch2.clientY;
          touchStartDistance = Math.sqrt(dx * dx + dy * dy);
          
          twoFingerStartX = (touch1.clientX + touch2.clientX) / 2;
          twoFingerStartY = (touch1.clientY + touch2.clientY) / 2;
        }

        e.preventDefault();
      }, { passive: false });

      // Touch move
      document.addEventListener('touchmove', (e) => {
        if (!markerDetected) return;

        const ctrl = getModelController();
        if (!ctrl) return;

        if (e.touches.length === 1 && !isMultiTouch) {
          // Single finger rotation
          const currentX = e.touches[0].clientX;
          const currentY = e.touches[0].clientY;
          
          const deltaX = currentX - lastTouchX;
          const deltaY = currentY - lastTouchY;

          currentRotationY += deltaX * 0.01;
          currentRotationX += deltaY * 0.01;

          updateModelTransform();
          
          lastTouchX = currentX;
          lastTouchY = currentY;
        } 
        else if (e.touches.length === 2) {
          // Two finger gestures
          const touch1 = e.touches[0];
          const touch2 = e.touches[1];
          
          // Pinch zoom
          const dx = touch1.clientX - touch2.clientX;
          const dy = touch1.clientY - touch2.clientY;
          const currentDistance = Math.sqrt(dx * dx + dy * dy);
          
          if (touchStartDistance > 0) {
            const scaleFactor = currentDistance / touchStartDistance;
            const newScale = currentScale * scaleFactor;
            currentScale = Math.max(0.5, Math.min(3, newScale));
            touchStartDistance = currentDistance;
          }
          
          // Pan
          const centerX = (touch1.clientX + touch2.clientX) / 2;
          const centerY = (touch1.clientY + touch2.clientY) / 2;
          
          const panDeltaX = (centerX - twoFingerStartX) * 0.003;
          const panDeltaY = (centerY - twoFingerStartY) * 0.003;
          
          currentPositionX += panDeltaX;
          currentPositionY -= panDeltaY;
          
          twoFingerStartX = centerX;
          twoFingerStartY = centerY;
          
          updateModelTransform();
        }

        e.preventDefault();
      }, { passive: false });

      // Touch end
      document.addEventListener('touchend', (e) => {
        if (e.touches.length === 0) {
          isMultiTouch = false;
          touchStartDistance = 0;
        } else if (e.touches.length === 1) {
          isMultiTouch = false;
          touchStartDistance = 0;
          lastTouchX = e.touches[0].clientX;
          lastTouchY = e.touches[0].clientY;
        }
      }, { passive: false });

      function updateModelTransform() {
        const ctrl = getModelController();
        if (!ctrl) return;
        
        ctrl.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
        ctrl.setAttribute('rotation', `${currentRotationX} ${currentRotationY} 0`);
        ctrl.setAttribute('position', `${currentPositionX} ${currentPositionY} 0`);
      }

      function resetTransform() {
        currentScale = 1;
        currentRotationX = 0;
        currentRotationY = 0;
        currentPositionX = 0;
        currentPositionY = 0;
        updateModelTransform();
      }

      // Scene initialization
      const scene = document.querySelector('a-scene');
      scene.addEventListener('loaded', () => {
        console.log('✅ A-Frame scene loaded');
        statusEl.textContent = '📸 Ready';
        statusEl.className = '';
      });

      scene.addEventListener('camera-set-active', () => {
        console.log('✅ Camera active');
      });

      // Error handler
      window.addEventListener('error', (event) => {
        console.error('Error:', event.message);
      });

      // Double tap to reset
      let lastTap = 0;
      document.addEventListener('touchend', (e) => {
        const currentTime = new Date().getTime();
        const tapLength = currentTime - lastTap;
        
        if (tapLength < 300 && tapLength > 0 && e.touches.length === 0 && markerDetected) {
          resetTransform();
          console.log('🔄 Reset via double tap');
        }
        lastTap = currentTime;
      });

      // Initial status
      setTimeout(() => {
        if (!markerDetected) {
          statusEl.textContent = '📸 Ready';
          statusEl.className = '';
        }
      }, 3000);
    </script>
  </body>
</html>
