<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tularasa AR Viewer</title>
    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- AR.js for QR code support -->
    <script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.5/three.js/ar.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        margin: 0;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      }

      #ar-container {
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      a-scene {
        width: 100%;
        height: 100%;
      }

      #ask-button {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        padding: 14px 32px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 50px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
        z-index: 100;
        transition: all 0.3s ease;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #ask-button:hover {
        transform: translateX(-50%) translateY(-2px);
        box-shadow: 0 12px 32px rgba(102, 126, 234, 0.6);
      }

      #ask-button:active {
        transform: translateX(-50%) translateY(0);
      }

      #gesture-info {
        position: fixed;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.75);
        color: white;
        padding: 14px 18px;
        border-radius: 8px;
        font-size: 13px;
        z-index: 99;
        max-width: 240px;
        line-height: 1.5;
        font-weight: 500;
        border-left: 3px solid #667eea;
      }

      #gesture-info.hidden {
        display: none;
      }

      #status {
        position: fixed;
        top: 20px;
        right: 20px;
        background: rgba(0, 0, 0, 0.75);
        color: #4ade80;
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 12px;
        z-index: 99;
        font-family: monospace;
        min-width: 130px;
        text-align: center;
      }

      .marker-hint {
        position: fixed;
        bottom: 100px;
        right: 20px;
        background: rgba(0, 0, 0, 0.75);
        color: #93c5fd;
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 12px;
        z-index: 98;
        max-width: 180px;
        line-height: 1.4;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="ar-container">
      <a-scene 
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono;"
        renderer="antialias: true; alpha: true; precision: medium"
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
          <a-asset-item id="courtModel" src="./basketball_court.glb"></a-asset-item>
        </a-assets>

        <a-camera-static></a-camera-static>

        <!-- QR Code Marker Detection -->
        <a-marker 
          type="barcode" 
          value="0"
          id="qr-marker"
          emitevents="true"
          smooth="true"
          smoothcount="10">
          <a-entity 
            id="model-controller"
            position="0 0 0"
            rotation="0 0 0"
            scale="1 1 1">
            <a-gltf-model 
              id="court-gltf"
              scale="1 1 1"
              position="0 0 0"
              rotation="0 0 0"
              src="#courtModel"
              animation-mixer>
            </a-gltf-model>
          </a-entity>
        </a-marker>
        
      </a-scene>

      <div id="gesture-info">
        📍 QR Marker AR<br>
        <br>
        👆 Rotate<br>
        🤏 Pinch zoom<br>
        👐 Pan<br>
        <br>
        💡 Double tap to reset
      </div>

      <div id="status">Loading...</div>

      <div class="marker-hint">
        📸 Point at QR code
      </div>

      <a href="https://wa.me/6285956252757" target="_blank" rel="noopener noreferrer" id="ask-button">
        <span>💬</span>
        <span>Ask Me</span>
      </a>
    </div>

    <script>
      // Model transformation state
      let modelController = document.getElementById('model-controller');
      const qrMarker = document.getElementById('qr-marker');
      const statusEl = document.getElementById('status');
      
      let currentScale = 1;
      let currentRotationX = 0;
      let currentRotationY = 0;
      let currentPositionX = 0;
      let currentPositionY = 0;

      // Touch tracking
      let touchStartDistance = 0;
      let lastTouchX = 0;
      let lastTouchY = 0;
      let twoFingerStartX = 0;
      let twoFingerStartY = 0;
      let isMultiTouch = false;
      let markerDetected = false;

      // Track marker detection
      qrMarker.addEventListener('markerFound', () => {
        markerDetected = true;
        statusEl.textContent = '✅ QR Detected';
        statusEl.style.color = '#4ade80';
        console.log('QR Marker found');
      });

      qrMarker.addEventListener('markerLost', () => {
        markerDetected = false;
        statusEl.textContent = '❌ QR Lost';
        statusEl.style.color = '#ef4444';
        resetTransform();
      });

      // Prevent default touch behaviors
      document.addEventListener('touchmove', (e) => {
        if (markerDetected) {
          e.preventDefault();
        }
      }, { passive: false });

      document.addEventListener('touchstart', (e) => {
        if (!markerDetected) return;

        if (e.touches.length === 1) {
          // Single finger - prepare for rotation
          lastTouchX = e.touches[0].clientX;
          lastTouchY = e.touches[0].clientY;
          isMultiTouch = false;
        } else if (e.touches.length === 2) {
          // Two fingers - prepare for pinch and pan
          isMultiTouch = true;
          const touch1 = e.touches[0];
          const touch2 = e.touches[1];
          
          // Calculate initial distance for pinch
          const dx = touch1.clientX - touch2.clientX;
          const dy = touch1.clientY - touch2.clientY;
          touchStartDistance = Math.sqrt(dx * dx + dy * dy);
          
          // Store center point for pan
          twoFingerStartX = (touch1.clientX + touch2.clientX) / 2;
          twoFingerStartY = (touch1.clientY + touch2.clientY) / 2;
        }

        e.preventDefault();
      }, { passive: false });

      document.addEventListener('touchmove', (e) => {
        if (!markerDetected || !modelController) return;

        if (e.touches.length === 1 && !isMultiTouch) {
          // Single finger swipe - rotate model
          const currentX = e.touches[0].clientX;
          const currentY = e.touches[0].clientY;
          
          const deltaX = currentX - lastTouchX;
          const deltaY = currentY - lastTouchY;

          // Rotation sensitivity
          currentRotationY += deltaX * 0.01;
          currentRotationX += deltaY * 0.01;

          updateModelTransform();
          
          lastTouchX = currentX;
          lastTouchY = currentY;
        } 
        else if (e.touches.length === 2) {
          // Two finger gestures
          const touch1 = e.touches[0];
          const touch2 = e.touches[1];
          
          // Pinch zoom
          const dx = touch1.clientX - touch2.clientX;
          const dy = touch1.clientY - touch2.clientY;
          const currentDistance = Math.sqrt(dx * dx + dy * dy);
          
          if (touchStartDistance > 0) {
            const scaleFactor = currentDistance / touchStartDistance;
            const newScale = currentScale * scaleFactor;
            
            // Clamp scale between 0.5x and 3x
            currentScale = Math.max(0.5, Math.min(3, newScale));
            touchStartDistance = currentDistance;
          }
          
          // Two finger pan
          const centerX = (touch1.clientX + touch2.clientX) / 2;
          const centerY = (touch1.clientY + touch2.clientY) / 2;
          
          const panDeltaX = (centerX - twoFingerStartX) * 0.003;
          const panDeltaY = (centerY - twoFingerStartY) * 0.003;
          
          currentPositionX += panDeltaX;
          currentPositionY -= panDeltaY;
          
          twoFingerStartX = centerX;
          twoFingerStartY = centerY;
          
          updateModelTransform();
        }

        e.preventDefault();
      }, { passive: false });

      document.addEventListener('touchend', (e) => {
        if (e.touches.length === 0) {
          isMultiTouch = false;
          touchStartDistance = 0;
        } else if (e.touches.length === 1) {
          isMultiTouch = false;
          touchStartDistance = 0;
          lastTouchX = e.touches[0].clientX;
          lastTouchY = e.touches[0].clientY;
        }
      }, { passive: false });

      function updateModelTransform() {
        if (!modelController) return;
        
        modelController.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
        modelController.setAttribute('rotation', `${currentRotationX} ${currentRotationY} 0`);
        modelController.setAttribute('position', `${currentPositionX} ${currentPositionY} 0`);
      }

      function resetTransform() {
        currentScale = 1;
        currentRotationX = 0;
        currentRotationY = 0;
        currentPositionX = 0;
        currentPositionY = 0;
        updateModelTransform();
      }

      // Scene load handler
      document.querySelector('a-scene').addEventListener('loaded', () => {
        console.log('AR Scene loaded - QR marker detection active');
        statusEl.textContent = 'Ready';
        statusEl.style.color = '#fbbf24';
      });

      // Double tap to reset
      let lastTap = 0;
      document.addEventListener('touchend', (e) => {
        const currentTime = new Date().getTime();
        const tapLength = currentTime - lastTap;
        
        if (tapLength < 300 && tapLength > 0 && e.touches.length === 0) {
          resetTransform();
          console.log('Transforms reset via double tap');
        }
        lastTap = currentTime;
      });
    </script>
  </body>
</html>
