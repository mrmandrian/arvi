<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Tularasa AR Viewer</title>
  
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  
  <style>
    body { margin: 0; overflow: hidden; touch-action: none; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #info { position: fixed; top: 20px; left: 20px; background: rgba(0, 0, 0, 0.7); color: white; padding: 12px 16px; border-radius: 8px; font-size: 13px; z-index: 99; border-left: 3px solid #667eea; pointer-events: none; }
    #status { position: fixed; top: 20px; right: 20px; background: rgba(0, 0, 0, 0.8); color: #fbbf24; padding: 12px 16px; border-radius: 8px; font-size: 12px; z-index: 99; font-family: monospace; min-width: 100px; text-align: center; border: 1px solid #fbbf24; pointer-events: none; }
    #status.detected { color: #4ade80; border-color: #4ade80; }
    #ask-button { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 14px 32px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 50px; font-size: 16px; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 8px; box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4); z-index: 100; }
  </style>
</head>
<body>
  <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <a-asset-item id="courtModel" src="https://raw.githubusercontent.com/mrmandrian/arvi/main/basketball_court.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="target">
      
      <a-entity id="model-controller" position="0 0 0" rotation="0 0 0" scale="2 2 2">
        
        <a-entity id="model-aligner" rotation="-90 0 0">
          <a-gltf-model id="court-gltf" src="#courtModel"></a-gltf-model>
        </a-entity>

      </a-entity>

    </a-entity>
  </a-scene>

  <div id="info">
    👆 Swipe to spin<br>
    🤏 Pinch to zoom<br>
    💡 Double tap to reset
  </div>
  <div id="status">📸 Scanning...</div>
  <a href="https://wa.me/6285956252757" id="ask-button"><span>💬</span><span>Ask Me</span></a>

  <script>
    const controller = document.getElementById('model-controller');
    const target = document.getElementById('target');
    const statusEl = document.getElementById('status');
    
    let scale = 2; 
    let rotY = 0;  

    target.addEventListener('targetFound', () => {
      statusEl.textContent = '✅ Detected'; 
      statusEl.className = 'detected';
    });

    target.addEventListener('targetLost', () => {
      statusEl.textContent = '📸 Scanning...'; 
      statusEl.className = '';
    });

    // Touch Gestures dengan Kunci Anti-Zoom Browser
    let lastX, dist;
    let lastTap = 0;

    document.addEventListener('touchmove', (e) => {
      e.preventDefault(); // Mengunci layar agar browser tidak ikut nge-zoom

      if (e.touches.length === 1) {
        rotY += (e.touches[0].clientX - (lastX || e.touches[0].clientX)) * 0.5;
        lastX = e.touches[0].clientX;
        controller.setAttribute('rotation', `0 ${rotY} 0`);
      } 
      else if (e.touches.length === 2) {
        const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        if (dist) {
          scale *= (d / dist);
          scale = Math.min(Math.max(scale, 0.5), 30); 
        }
        dist = d;
        controller.setAttribute('scale', `${scale} ${scale} ${scale}`);
      }
    }, { passive: false });

    document.addEventListener('touchend', (e) => { 
      lastX = null; 
      dist = null; 
      
      const currentTime = new Date().getTime();
      const tapLength = currentTime - lastTap;
      if (tapLength < 300 && tapLength > 0 && e.touches.length === 0) {
        scale = 2;
        rotY = 0;
        controller.setAttribute('scale', `${scale} ${scale} ${scale}`);
        controller.setAttribute('rotation', `0 ${rotY} 0`);
      }
      lastTap = currentTime;
    });
  </script>
</body>
</html>
