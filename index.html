<!DOCTYPE html>
<html>
  <head>
    <title>Tularasa AR Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; touch-action: none; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      
      #info { position: fixed; top: 20px; left: 20px; background: rgba(0, 0, 0, 0.7); color: white; padding: 12px 16px; border-radius: 8px; font-size: 13px; z-index: 99; border-left: 3px solid #667eea; pointer-events: none; }
      
      #ask-button { 
        position: fixed; 
        bottom: 30px; 
        left: 5%; 
        width: 90%; 
        padding: 14px 0; 
        border-radius: 50px; 
        font-weight: bold; 
        font-size: 16px; 
        text-align: center; 
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
        color: white; 
        text-decoration: none; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
        z-index: 100; 
      }

      /* Container fleksibel untuk tombol pilihan model */
      #model-selector {
        position: fixed;
        bottom: 90px;
        left: 5%;
        width: 90%;
        display: flex;
        gap: 10px;
        z-index: 100;
        justify-content: space-between;
      }

      .model-btn {
        flex: 1;
        padding: 12px 0;
        background: #a3e635; 
        color: white;
        border: none;
        border-radius: 30px;
        font-size: 16px;
        font-weight: bold;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        cursor: pointer;
        transition: transform 0.1s, background 0.3s;
      }
      
      .model-btn:active {
        transform: scale(0.95);
      }
      
      .model-btn.active {
        background: #65a30d; 
        box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
      }
    </style>
  </head>
  <body>
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;" renderer="colorManagement: true" vr-mode-ui="enabled: false">
      
      <a-marker type="pattern" url="./pattern-mcQBre.patt">
        
        <a-entity id="model-controller" rotation="0 0 0" position="0 0 0" scale="1 1 1">
          <a-gltf-model id="active-model" src="https://raw.githubusercontent.com/mrmandrian/arvi/main/ujang.glb"></a-gltf-model>
        </a-entity>

      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>

    <div id="info">
      👆 Swipe to spin<br>
      🤏 Pinch to zoom<br>
      💡 Double tap to reset
    </div>

    <div id="model-selector">
      <button class="model-btn active" onclick="changeModel(1, this)">1</button>
      <button class="model-btn" onclick="changeModel(2, this)">2</button>
      <button class="model-btn" onclick="changeModel(3, this)">3</button>
    </div>

    <a href="https://wa.me/6285956252757" id="ask-button">💬 Ask Me</a>

    <script>
      const controller = document.getElementById('model-controller');
      const activeModel = document.getElementById('active-model');
      
      let currentModelId = 1; // Menyimpan ID model yang sedang aktif
      let scale = 1; 
      let baseRotX = 0; 
      let currentRotX = 0; 
      let rotY = 0;
      
      let lastX, lastY, dist; 
      let lastTap = 0; // Untuk deteksi double tap

      // Konfigurasi Autopilot Model
      const models = {
        1: { url: "https://raw.githubusercontent.com/mrmandrian/arvi/main/ujang.glb", initScale: 1, initRotX: 0 },
        2: { url: "https://raw.githubusercontent.com/mrmandrian/arvi/main/forest_house.glb", initScale: 4, initRotX: 90 },
        3: { url: "https://raw.githubusercontent.com/mrmandrian/arvi/main/hiking_boots_lowpoly.glb", initScale: 3, initRotX: 0 }
      };

      // Fungsi Ganti Model
      window.changeModel = function(modelId, btnElement) {
        currentModelId = modelId;
        const config = models[modelId];
        activeModel.setAttribute('src', config.url);
        
        scale = config.initScale;
        baseRotX = config.initRotX;
        currentRotX = baseRotX; 
        rotY = 0;
        
        controller.setAttribute('scale', `${scale} ${scale} ${scale}`);
        controller.setAttribute('rotation', `${currentRotX} 0 0`);

        document.querySelectorAll('.model-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
      };

      // Gestur Pinch & Swipe 360
      document.addEventListener('touchmove', (e) => {
        // Biarkan tombol UI tetap bisa di-klik
        if(e.target.closest('#model-selector') || e.target.closest('#ask-button')) return;
        
        e.preventDefault(); // Kunci zoom browser bawaan
        
        if (e.touches.length === 1) {
          // Swipe Kiri-Kanan (Y) dan Atas-Bawah (X)
          rotY += (e.touches[0].clientX - (lastX || e.touches[0].clientX)) * 0.5;
          currentRotX += (e.touches[0].clientY - (lastY || e.touches[0].clientY)) * 0.5;
          
          lastX = e.touches[0].clientX;
          lastY = e.touches[0].clientY; 
          
          controller.setAttribute('rotation', `${currentRotX} ${rotY} 0`);
          
        } else if (e.touches.length === 2) {
          // Pinch to Zoom
          const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
          if (dist) {
            scale *= (d / dist);
            scale = Math.min(Math.max(scale, 0.1), 30);
          }
          dist = d;
          controller.setAttribute('scale', `${scale} ${scale} ${scale}`);
        }
      }, { passive: false });

      // Deteksi Double Tap Reset & Clear Data
      document.addEventListener('touchend', (e) => { 
        lastX = null; 
        lastY = null; 
        dist = null; 
        
        const currentTime = new Date().getTime();
        const tapLength = currentTime - lastTap;
        
        // Jika layar diketuk 2x, reset ke ukuran dan rotasi bawaan model tersebut
        if (tapLength < 300 && tapLength > 0 && e.touches.length === 0) {
          scale = models[currentModelId].initScale;
          currentRotX = models[currentModelId].initRotX;
          rotY = 0;
          
          controller.setAttribute('scale', `${scale} ${scale} ${scale}`);
          controller.setAttribute('rotation', `${currentRotX} 0 0`);
        }
        lastTap = currentTime;
      });
      
      // Inisialisasi awal saat pertama kali web dimuat
      currentRotX = models[1].initRotX; 
    </script>
  </body>
</html>
