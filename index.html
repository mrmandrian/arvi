<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tularasa AR Viewer</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        margin: 0;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      a-scene {
        width: 100vw;
        height: 100vh;
      }

      #info {
        position: fixed;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 13px;
        z-index: 99;
        border-left: 3px solid #667eea;
      }

      #status {
        position: fixed;
        top: 20px;
        right: 20px;
        background: rgba(0, 0, 0, 0.7);
        color: #fbbf24;
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 12px;
        z-index: 99;
        font-family: monospace;
        min-width: 100px;
        text-align: center;
      }

      #status.detected {
        color: #4ade80;
      }

      #ask-button {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        padding: 14px 32px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 50px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
        z-index: 100;
        transition: all 0.3s ease;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #ask-button:hover {
        transform: translateX(-50%) translateY(-2px);
        box-shadow: 0 12px 32px rgba(102, 126, 234, 0.6);
      }
    </style>
  </head>
  <body>
    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="courtModel" src="./basketball_court.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="target">
        <a-entity
          id="model-controller"
          position="0 0 0"
          rotation="0 0 0"
          scale="1 1 1"
          animation="property: rotation; to: 0 360 0; dur: 6000; easing: linear; loop: true">
          <a-gltf-model
            id="court-gltf"
            scale="1 1 1"
            position="0 0 0"
            src="#courtModel">
          </a-gltf-model>
        </a-entity>
      </a-entity>
    </a-scene>

    <div id="info">
      👆 Swipe to rotate<br>
      🤏 Pinch to zoom<br>
      💡 Double tap to reset
    </div>

    <div id="status">📸 Ready</div>

    <a href="https://wa.me/6285956252757" target="_blank" rel="noopener noreferrer" id="ask-button">
      <span>💬</span>
      <span>Ask Me</span>
    </a>

    <script>
      const modelController = document.getElementById('model-controller');
      const target = document.getElementById('target');
      const statusEl = document.getElementById('status');

      let currentScale = 1;
      let currentRotationX = 0;
      let currentRotationY = 0;

      let touchStartDistance = 0;
      let lastTouchX = 0;
      let lastTouchY = 0;
      let twoFingerStartX = 0;
      let twoFingerStartY = 0;
      let isMultiTouch = false;

      // Track marker detection
      target.addEventListener('targetFound', () => {
        statusEl.textContent = '✅ Detected';
        statusEl.className = 'detected';
        modelController.removeAttribute('animation');
      });

      target.addEventListener('targetLost', () => {
        statusEl.textContent = '📸 Scanning';
        modelController.setAttribute('animation', 'property: rotation; to: 0 360 0; dur: 6000; easing: linear; loop: true');
      });

      // Touch handling
      document.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
          lastTouchX = e.touches[0].clientX;
          lastTouchY = e.touches[0].clientY;
          isMultiTouch = false;
        } else if (e.touches.length === 2) {
          isMultiTouch = true;
          const touch1 = e.touches[0];
          const touch2 = e.touches[1];

          const dx = touch1.clientX - touch2.clientX;
          const dy = touch1.clientY - touch2.clientY;
          touchStartDistance = Math.sqrt(dx * dx + dy * dy);

          twoFingerStartX = (touch1.clientX + touch2.clientX) / 2;
          twoFingerStartY = (touch1.clientY + touch2.clientY) / 2;
        }
      });

      document.addEventListener('touchmove', (e) => {
        if (e.touches.length === 1 && !isMultiTouch) {
          const deltaX = e.touches[0].clientX - lastTouchX;
          const deltaY = e.touches[0].clientY - lastTouchY;

          currentRotationY += deltaX * 0.01;
          currentRotationX += deltaY * 0.01;

          updateModel();
          lastTouchX = e.touches[0].clientX;
          lastTouchY = e.touches[0].clientY;
        } else if (e.touches.length === 2) {
          const touch1 = e.touches[0];
          const touch2 = e.touches[1];

          // Pinch zoom
          const dx = touch1.clientX - touch2.clientX;
          const dy = touch1.clientY - touch2.clientY;
          const currentDistance = Math.sqrt(dx * dx + dy * dy);

          if (touchStartDistance > 0) {
            const scaleFactor = currentDistance / touchStartDistance;
            currentScale = Math.max(0.5, Math.min(3, currentScale * scaleFactor));
            touchStartDistance = currentDistance;
          }

          updateModel();
        }
      });

      document.addEventListener('touchend', (e) => {
        if (e.touches.length === 0) {
          isMultiTouch = false;
          touchStartDistance = 0;
        }
      });

      function updateModel() {
        modelController.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
        modelController.setAttribute('rotation', `${currentRotationX} ${currentRotationY} 0`);
      }

      // Double tap to reset
      let lastTap = 0;
      document.addEventListener('touchend', (e) => {
        const now = new Date().getTime();
        if (now - lastTap < 300) {
          currentScale = 1;
          currentRotationX = 0;
          currentRotationY = 0;
          updateModel();
        }
        lastTap = now;
      });
    </script>
  </body>
</html>
