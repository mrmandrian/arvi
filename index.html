<!DOCTYPE html>
<html>
  <head>
    <title>Tularasa AR Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">
      
      <a-marker type="pattern" url="./pattern-marker.patt">
        
        <a-entity
          gltf-model="https://raw.githubusercontent.com/mrmandrian/arvi/main/basketball_court.glb"
          scale="2 2 2"
          position="0 0 0"
          rotation="-90 0 0"
        >
        </a-entity>

      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>

    <a href="https://wa.me/6285956252757" style="position: fixed; bottom: 30px; left: 5%; width: 90%; padding: 14px 0; border-radius: 50px; font-weight: bold; font-size: 16px; text-align: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; text-decoration: none; box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);">
      💬 Ask Me
    </a>
    
  </body>
</html>
